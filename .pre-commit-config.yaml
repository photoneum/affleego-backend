exclude: "^docs/|/migrations/|^.vscode/"
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-illegal-windows-names
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/adamchainz/django-upgrade
    rev: "1.24.0"
    hooks:
      - id: django-upgrade
        args: ["--target-version", "4.2"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: [--py312-plus]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8

  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      # - id: djlint
      #   args: ["--check"]
      - id: djlint
        args: ["--reformat"]
      # - id: djlint-django
      #   args: ["--lint"]

  # - repo: https://github.com/adrienverge/yamllint.git
  #   rev: v1.37.0
  #   hooks:
  #     - id: yamllint
  #       args: ["-d", "{extends: default, ignore: .venv}", "-s", "."]

  # - repo: https://github.com/dotenv-linter/dotenv-linter
  #   rev: v3.3.0
  #   hooks:
  #     - id: dotenv-linter
  #       args: ["config/.env", "config/.env.template"]

  - repo: local
    hooks:
      - id: django-migration-linter
        name: Check django migrations for backward incompatible changes
        entry: python manage.py lintmigrations --exclude-apps=axes
        types:
          - python
        files: "migrations/"
        language: system
        pass_filenames: false

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
