<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8ff" />
      <stop offset="100%" stop-color="#f1f1ff" />
    </linearGradient>
    <!-- Glow filter for connection lines -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGradient)" rx="10" ry="10" />
  <rect width="500" height="400" fill="url(#grid)" rx="10" ry="10" opacity="0.4" />

  <!-- Abstract Circular Nodes -->
  <!-- Waste Generator Node -->
  <g transform="translate(125, 200)">
    <circle cx="0" cy="0" r="60" fill="#f6f6f6" stroke="#e0e0e0" stroke-width="1" />
    <circle cx="0" cy="0" r="50" fill="#ffffff" stroke="#eaeaea" stroke-width="1" />

    <!-- Waste icons inside -->
    <g transform="translate(-25, -15)">
      <rect x="0" y="0" width="16" height="24" rx="2" fill="#5F57FF" opacity="0.9" />
      <rect x="4" y="4" width="8" height="3" fill="white" opacity="0.7" />
    </g>

    <g transform="translate(10, -20)">
      <circle cx="0" cy="0" r="13" fill="#32E0C4" opacity="0.9" />
      <path d="M-5,-3 L5,-3 L0,8 Z" fill="white" opacity="0.7" />
    </g>

    <g transform="translate(-10, 15)">
      <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#FF6B6B" opacity="0.9" />
      <rect x="-6" y="-6" width="12" height="12" rx="1" fill="white" opacity="0.7" />
    </g>

    <text x="0" y="70" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#555" text-anchor="middle">Generator</text>
  </g>

  <!-- Processor Node (Engine Sync) -->
  <g transform="translate(250, 140)">
    <circle cx="0" cy="0" r="70" fill="#f6f6f6" stroke="#e0e0e0" stroke-width="1" />
    <circle cx="0" cy="0" r="60" fill="#ffffff" stroke="#eaeaea" stroke-width="1" />

    <!-- Engine Sync logo/symbol -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="40" fill="#5F57FF" opacity="0.15" />
      <path d="M-25,0 A25,25 0 0,1 25,0 A25,25 0 0,1 -25,0 Z" stroke="#5F57FF" stroke-width="4" fill="none" stroke-dasharray="1,4" />
      <path d="M0,-25 A25,25 0 0,1 0,25 A25,25 0 0,1 0,-25 Z" stroke="#5F57FF" stroke-width="4" fill="none" stroke-dasharray="1,4" transform="rotate(45)" />

      <!-- Rotating circling dot animation -->
      <circle cx="25" cy="0" r="6" fill="#5F57FF">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="8s"
          repeatCount="indefinite" />
      </circle>
    </g>

    <text x="0" y="80" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#5F57FF" text-anchor="middle">Engine Sync</text>
  </g>

  <!-- Collector Node -->
  <g transform="translate(375, 200)">
    <circle cx="0" cy="0" r="60" fill="#f6f6f6" stroke="#e0e0e0" stroke-width="1" />
    <circle cx="0" cy="0" r="50" fill="#ffffff" stroke="#eaeaea" stroke-width="1" />

    <!-- Collector icons -->
    <g transform="translate(-20, -15)">
      <rect x="-12" y="-15" width="24" height="30" rx="2" fill="#32E0C4" opacity="0.9" />
      <path d="M-8,-10 L8,-10 L8,10 L-8,10 Z" stroke="white" stroke-width="2" fill="none" opacity="0.7" />
      <path d="M-8,0 L8,0" stroke="white" stroke-width="2" opacity="0.7" />
    </g>

    <g transform="translate(15, 10)">
      <circle cx="0" cy="0" r="15" fill="#5F57FF" opacity="0.8" />
      <path d="M0,-7 L0,7 M-7,0 L7,0" stroke="white" stroke-width="2" opacity="0.7" />
    </g>

    <text x="0" y="70" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#555" text-anchor="middle">Collector</text>
  </g>

  <!-- Connection lines with animations -->
  <!-- Generator to Engine Sync -->
  <path d="M145,165 C175,140 210,140 230,140" stroke="#5F57FF" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" from="0,150" to="150,0" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Engine Sync to Collector -->
  <path d="M295,165 C320,180 340,165 355,180" stroke="#32E0C4" stroke-width="2" fill="none" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" from="0,150" to="150,0" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Data points flowing on paths -->
  <circle cx="0" cy="0" r="4" fill="#5F57FF">
    <animateMotion path="M145,165 C175,140 210,140 230,140" dur="3s" repeatCount="indefinite" />
  </circle>

  <circle cx="0" cy="0" r="4" fill="#32E0C4">
    <animateMotion path="M295,165 C320,180 340,165 355,180" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Recycling symbol in the background -->
  <g transform="translate(250, 280)">
    <circle cx="0" cy="0" r="30" fill="#f6f6f6" stroke="#eaeaea" stroke-width="1" />
    <path d="M-15,-5 L0,-20 L15,-5 M15,5 L0,20 L-15,5" stroke="#32E0C4" stroke-width="2" fill="none" />
    <path d="M-10,0 A15,15 0 0,1 10,0 A15,15 0 0,1 -10,0" transform="rotate(30)" stroke="#32E0C4" stroke-width="2" fill="none" />
    <path d="M-10,0 A15,15 0 0,1 10,0 A15,15 0 0,1 -10,0" transform="rotate(150)" stroke="#32E0C4" stroke-width="2" fill="none" />
    <path d="M-10,0 A15,15 0 0,1 10,0 A15,15 0 0,1 -10,0" transform="rotate(270)" stroke="#32E0C4" stroke-width="2" fill="none" />
  </g>
</svg>
